<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found | Daily Grid</title>
  <meta name="description" content="The page you're looking for doesn't exist.">
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/png" href="/Images/web%20icon.png">
  <link rel="canonical" href="https://dailygrid.app/404.html">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --brand-bg: #020617; --brand-gold: #D4A650; }
    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--brand-bg);
      color: #f8fafc;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 50% 0%, rgba(212,166,80,.12), transparent),
        radial-gradient(ellipse 40% 30% at 100% 100%, rgba(212,166,80,.06), transparent);
      pointer-events: none;
    }
    .glass {
      background: rgba(255,255,255,.03);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,.08);
    }
    a:focus-visible {
      outline: 2px solid var(--brand-gold);
      outline-offset: 3px;
    }
  </style>
</head>
<body>
  <div class="relative z-10 w-full max-w-md mx-auto px-6 text-center">
    <img src="/Images/web%20icon.png" alt="" width="48" height="48" class="mx-auto mb-6 rounded-xl opacity-60" decoding="async">
    <div class="glass rounded-3xl p-10">
      <div class="text-8xl font-bold mb-2" style="color: var(--brand-gold); opacity: .35;">404</div>
      <h1 class="text-2xl font-bold mb-3 text-white">Page not found</h1>
      <p class="text-zinc-400 text-sm mb-8 leading-relaxed">
        That puzzle piece doesn't fit here. The page you're looking for has moved or never existed.
      </p>
      <div class="flex flex-col sm:flex-row gap-3 justify-center">
        <a href="/games/"
           class="inline-flex items-center justify-center gap-2 px-5 py-3 rounded-xl font-semibold text-sm"
           style="background: linear-gradient(135deg, var(--brand-gold), #b8893a); color: #1b1204;">
          Play Daily Puzzles
        </a>
        <a href="/games/practice/"
           class="inline-flex items-center justify-center gap-2 px-5 py-3 rounded-xl font-semibold text-sm"
           style="background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.12); color: #d4d4d8;">
          Practice Mode
        </a>
      </div>
    </div>
    <p class="mt-6 text-xs text-zinc-600">
      <a href="/" class="hover:text-zinc-400 transition-colors">Home</a>
      <span class="mx-2">·</span>
      <a href="/support/" class="hover:text-zinc-400 transition-colors">Support</a>
    </p>
  </div>
</body>
</html>
