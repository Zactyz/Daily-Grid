<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — Daily Grid</title>
  <meta name="description" content="The page you're looking for doesn't exist.">
  <meta name="robots" content="noindex">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --brand-bg: #020617; --brand-gold: #D4A650; }
    body { font-family: 'Space Grotesk', sans-serif; background: var(--brand-bg); color: #f8fafc; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
    body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse 60% 40% at 50% 0%, rgba(212,166,80,.12), transparent), radial-gradient(ellipse 40% 30% at 100% 100%, rgba(212,166,80,.06), transparent); pointer-events: none; }
    .glass { background: rgba(255,255,255,.03); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,.08); }
  </style>
</head>
<body>
  <div class="relative z-10 w-full max-w-md mx-auto px-6 text-center">
    <div class="glass rounded-3xl p-10">
      <div class="text-8xl font-bold mb-2" style="color: var(--brand-gold); opacity: .35;">404</div>
      <h1 class="text-2xl font-bold mb-3 text-white">Page not found</h1>
      <p class="text-zinc-400 text-sm mb-8 leading-relaxed">
        That puzzle piece doesn't fit here. The page you're looking for has moved or never existed.
      </p>
      <div class="flex flex-col sm:flex-row gap-3 justify-center">
        <a href="/games/"
           class="inline-flex items-center justify-center gap-2 px-5 py-3 rounded-xl font-semibold text-sm"
           style="background: linear-gradient(135deg, var(--brand-gold), #b8893a); color: #1b1204;">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
          Play Today's Puzzles
        </a>
        <a href="/"
           class="inline-flex items-center justify-center gap-2 px-5 py-3 rounded-xl font-semibold text-sm"
           style="background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.12); color: #d4d4d8;">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
          </svg>
          Home
        </a>
      </div>
    </div>
    <p class="mt-6 text-xs text-zinc-600">Daily Grid &mdash; nine puzzles, every day</p>
  </div>
</body>
</html>
