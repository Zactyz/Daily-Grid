<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Feedback | Daily Grid Games</title>
  <meta name="theme-color" content="#0b1120">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="/games/manifest.json">
  <link rel="apple-touch-icon" href="/games/assets/dg-games-180.png">
  <link rel="icon" type="image/png" href="/Images/web%20icon.png">
  <meta name="description" content="Send feedback for Daily Grid Games — bugs, ideas, and suggestions.">
  <link rel="canonical" href="https://dailygrid.app/games/feedback/">
  <meta property="og:title" content="Feedback | Daily Grid Games">
  <meta property="og:description" content="Send feedback for Daily Grid Games — bugs, ideas, and suggestions.">
  <meta property="og:image" content="https://dailygrid.app/games/assets/og-games.png">
  <meta property="og:url" content="https://dailygrid.app/games/feedback/">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Feedback | Daily Grid Games">
  <meta name="twitter:description" content="Send feedback for Daily Grid Games — bugs, ideas, and suggestions.">
  <meta name="twitter:image" content="https://dailygrid.app/games/assets/og-games.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/games/common/design-tokens.css">
  <link rel="stylesheet" href="/games/common/tab-bar.css">
  <link rel="stylesheet" href="/games/common/hub-nav.css">
  <link rel="stylesheet" href="/games/common/hub-footer.css">
  <style>
    /* Match the body background so a short page never reveals a darker band
       under the floating tab bar when the mobile toolbar collapses. */
    html {
      background: var(--dg-bg);
      min-height: 100%;
    }
    body {
      font-family: var(--dg-font-ui);
      background: var(--dg-bg);
      color: var(--dg-text);
      min-height: 100dvh;
      margin: 0;
      display: flex;
      flex-direction: column;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% -10%, rgba(60, 90, 160, 0.35), transparent),
        radial-gradient(ellipse 70% 40% at 0% 100%, rgba(35, 60, 120, 0.25), transparent);
      z-index: -1;
      pointer-events: none;
    }
    .glass-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 1rem;
      backdrop-filter: blur(12px);
    }
    #feedback-message {
      min-height: 140px;
      resize: vertical;
    }
  </style>
</head>
<body class="dg-hub-nav-page dg-hub-site-fonts">
  <nav id="dg-hub-nav" class="dg-hub-nav" aria-label="Games hub">
      <a href="/" class="dg-hub-nav__brand">
        <img src="/Images/web%20icon.png" alt="" class="dg-hub-nav__logo" width="40" height="40" decoding="async">
        <span class="dg-hub-nav__title">Daily Grid</span>
      </a>
      <div class="dg-hub-nav__links">
        <a href="/games/" data-hub-key="daily">Games</a>
        <a href="/games/practice/" data-hub-key="practice">Practice</a>
        <a href="/games/medals/" data-hub-key="medals">Medals</a>
        <a href="/games/profile/" data-hub-key="profile" class="is-active" aria-current="page">Profile</a>
      </div>
    </nav>
<main id="main-content" tabindex="-1" class="hub-page-main pb-6">
    <div class="flex items-center gap-3 mb-6">
      <a href="/games/profile/" class="text-slate-400" aria-label="Back to profile" style="text-decoration:none">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
      </a>
      <div>
        <p class="text-[11px] uppercase tracking-[0.3em] text-slate-400">Daily Grid</p>
        <h1 class="text-2xl font-semibold text-amber-200">Feedback</h1>
      </div>
    </div>

    <section class="glass-card p-4 mb-4">
      <p class="text-sm text-slate-300 mb-3">Tell us what you think, bugs, ideas, or anything we can improve.</p>
      <textarea id="feedback-message" maxlength="2000" placeholder="Your message…"
        class="w-full px-4 py-3 rounded-lg bg-white/5 border border-white/10 text-white text-sm placeholder:text-zinc-600 focus:outline-none focus:border-amber-500/40"></textarea>
      <p class="text-xs text-slate-500 mt-2"><span id="char-count">0</span> / 2000</p>
      <button type="button" id="feedback-submit"
        class="w-full mt-4 py-2.5 rounded-lg font-semibold text-sm text-black disabled:opacity-50"
        style="background:linear-gradient(135deg,#D4A650,#E5C37E)">Send feedback</button>
      <p id="feedback-status" class="text-xs mt-3 hidden"></p>
    </section>
  </main>

  <script type="module">
    import { mountTabBar } from '/games/common/tab-bar.js';
    import { mountHubNav } from '/games/common/hub-nav.js';
    import { mountHubFooter } from '/games/common/hub-footer.js';
    import { getOrCreateAnonId } from '/games/common/utils.js';
    import { getPwaModeLabel } from '/games/common/feedback-hub.js';

    mountTabBar('profile');
    mountHubNav('profile');
    mountHubFooter();

    const textarea = document.getElementById('feedback-message');
    const charCount = document.getElementById('char-count');
    const submitBtn = document.getElementById('feedback-submit');
    const status = document.getElementById('feedback-status');

    textarea?.addEventListener('input', () => {
      if (charCount) charCount.textContent = String(textarea.value.length);
    });

    submitBtn?.addEventListener('click', async () => {
      const message = textarea?.value?.trim();
      if (!message) {
        showStatus('Please enter a message.', true);
        return;
      }
      submitBtn.disabled = true;
      showStatus('Sending…', false);
      try {
        const res = await fetch('/api/feedback/submit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            message,
            anonId: getOrCreateAnonId(),
            page: '/games/feedback/',
            pwaMode: getPwaModeLabel()
          })
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || 'Failed to send');
        textarea.value = '';
        if (charCount) charCount.textContent = '0';
        showStatus('Thanks! Your feedback was sent.', false, true);
      } catch (err) {
        showStatus(err.message || 'Could not send. Try again later.', true);
      } finally {
        submitBtn.disabled = false;
      }
    });

    function showStatus(text, isError, isSuccess) {
      if (!status) return;
      status.textContent = text;
      status.classList.remove('hidden');
      status.style.color = isError ? '#f87171' : isSuccess ? '#86efac' : '#94a3b8';
    }

  </script>
</body>
</html>
