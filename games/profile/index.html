<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0b1120">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Profile — Daily Grid">
  <title>Profile — Daily Grid Games</title>
  <meta name="description" content="Your Daily Grid stats, streaks, and settings.">
  <link rel="manifest" href="/games/manifest.json">
  <link rel="apple-touch-icon" href="/games/assets/dg-games-180.png">
  <link rel="icon" type="image/png" href="/Images/web%20icon.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/games/common/tab-bar.css">
  <style>
    :root { --brand-gold: #D4A650; }
    body {
      font-family: 'Inter', sans-serif;
      background: #020617;
      color: #F8FAFC;
      min-height: 100dvh;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 70% 50% at 50% -5%, rgba(167,139,250,0.1) 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 0% 100%, rgba(35,60,120,0.18) 0%, transparent 70%);
      z-index: -1; pointer-events: none;
    }
    h1, h2, h3 { font-family: 'Space Grotesk', sans-serif; }

    /* Glass card */
    .glass-card {
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(16px) saturate(160%);
      -webkit-backdrop-filter: blur(16px) saturate(160%);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 16px;
      position: relative; overflow: hidden;
    }
    .glass-card::before {
      content: ''; position: absolute;
      top: 0; left: 10%; right: 10%; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
      pointer-events: none;
    }

    /* Avatar ring */
    .avatar-ring {
      background: conic-gradient(from 0deg, #D4A650, #a78bfa, #60a5fa, #D4A650);
      border-radius: 999px; padding: 2.5px;
    }
    .avatar-inner {
      background: #090e1f;
      border-radius: 999px;
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
    }

    /* Stat row */
    .stat-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .stat-row:last-child { border-bottom: none; }
    .stat-label { font-size: 13px; color: rgba(255,255,255,0.5); }
    .stat-value { font-size: 13px; font-weight: 700; color: rgba(255,255,255,0.9); font-family: 'JetBrains Mono', monospace; }

    /* Toggle switch */
    .toggle {
      position: relative; width: 44px; height: 26px; flex-shrink: 0;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-track {
      position: absolute; inset: 0;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 999px;
      cursor: pointer; transition: background 0.2s ease;
    }
    .toggle-thumb {
      position: absolute;
      top: 3px; left: 3px;
      width: 18px; height: 18px;
      border-radius: 999px;
      background: rgba(255,255,255,0.5);
      transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), background 0.2s ease;
      box-shadow: 0 1px 4px rgba(0,0,0,0.25);
    }
    .toggle input:checked ~ .toggle-track { background: rgba(167,139,250,0.35); border-color: rgba(167,139,250,0.5); }
    .toggle input:checked ~ .toggle-track .toggle-thumb { transform: translateX(18px); background: #a78bfa; }
    .toggle input:disabled ~ .toggle-track { opacity: 0.4; cursor: not-allowed; }

    /* Game row in stats */
    .game-stat-row {
      display: flex; align-items: center; gap-3;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .game-stat-row:last-child { border-bottom: none; }
    .game-logo-sm {
      width: 32px; height: 32px; border-radius: 8px;
      object-fit: cover; flex-shrink: 0;
      background: rgba(255,255,255,0.05);
    }

    /* Flame streak */
    .streak-flame { color: #f97316; }
    .best-streak { color: rgba(255,255,255,0.45); }

    /* Section header */
    .section-header {
      font-size: 11px; font-weight: 600;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <div class="max-w-lg mx-auto px-4 pt-safe">

    <!-- Header -->
    <header class="flex items-center justify-between py-5">
      <h1 class="text-xl font-bold tracking-tight">Profile</h1>
      <!-- TODO (Tier 2 — user accounts): settings gear or edit button once auth is added -->
    </header>

    <!-- Identity card -->
    <section class="glass-card p-5 mb-4 flex items-center gap-4">
      <!-- Avatar: initials-based, from the last game the user claimed initials on -->
      <div class="avatar-ring" style="width:60px;height:60px">
        <div class="avatar-inner">
          <span id="avatar-initials" class="text-xl font-bold" style="font-family:'Space Grotesk',sans-serif;color:#a78bfa">?</span>
        </div>
      </div>
      <div class="flex-1 min-w-0">
        <!-- TODO (Tier 2 — user accounts): replace "Anonymous Solver" with real username after auth -->
        <p class="font-semibold text-base" id="display-name">Anonymous Solver</p>
        <p class="text-xs text-slate-400" id="member-since"></p>
      </div>
      <!-- Overall stats pill -->
      <div class="text-right flex-shrink-0">
        <p class="text-2xl font-bold" id="total-solved">0</p>
        <p class="text-xs text-slate-400">solved</p>
      </div>
    </section>

    <!-- Medal summary row -->
    <section class="glass-card p-4 mb-4">
      <p class="section-header">Medals</p>
      <div class="flex gap-3 justify-around">
        <div class="flex flex-col items-center gap-1">
          <span class="text-xl font-bold" style="color:#facc15" id="medal-gold">0</span>
          <span class="text-xs text-slate-400">Gold</span>
        </div>
        <div class="w-px bg-white/5"></div>
        <div class="flex flex-col items-center gap-1">
          <span class="text-xl font-bold" style="color:#cbd5e1" id="medal-silver">0</span>
          <span class="text-xs text-slate-400">Silver</span>
        </div>
        <div class="w-px bg-white/5"></div>
        <div class="flex flex-col items-center gap-1">
          <span class="text-xl font-bold" style="color:#fb923c" id="medal-bronze">0</span>
          <span class="text-xs text-slate-400">Bronze</span>
        </div>
        <div class="w-px bg-white/5"></div>
        <div class="flex flex-col items-center gap-1">
          <span class="text-xl font-bold text-slate-200" id="medal-top10">0</span>
          <span class="text-xs text-slate-400">Top 10</span>
        </div>
      </div>
    </section>

    <!-- Per-game stats -->
    <section class="glass-card p-4 mb-4">
      <p class="section-header">Game Stats</p>
      <div id="game-stats-list">
        <p class="text-sm text-slate-500 text-center py-4">Complete some puzzles to see your stats.</p>
      </div>
    </section>

    <!-- Notifications & Settings -->
    <section class="glass-card p-4 mb-4">
      <p class="section-header">Notifications</p>

      <div class="stat-row">
        <div>
          <p class="text-sm font-medium">Daily Reminder</p>
          <p class="text-xs text-slate-400 mt-0.5" id="push-status-text">Get notified when new puzzles are live</p>
        </div>
        <label class="toggle" id="push-toggle-wrap">
          <input type="checkbox" id="push-toggle" aria-label="Enable daily puzzle notifications">
          <span class="toggle-track">
            <span class="toggle-thumb"></span>
          </span>
        </label>
      </div>

      <!-- TODO (Tier 2): Add notification preferences for specific games, quiet hours, etc. -->
    </section>

    <!-- App & Links -->
    <section class="glass-card p-4 mb-4">
      <p class="section-header">Daily Grid</p>

      <a href="https://apps.apple.com/us/app/daily-grid/id6757233848" target="_blank" rel="noopener"
         class="stat-row" style="text-decoration:none;display:flex;">
        <div class="flex items-center gap-3">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" class="text-slate-400">
            <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
          </svg>
          <span class="text-sm">Download the App</span>
        </div>
        <svg class="ml-auto text-slate-600" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
      </a>

      <a href="/games/" class="stat-row" style="text-decoration:none;display:flex;">
        <div class="flex items-center gap-3">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" class="text-slate-400">
            <rect x="3" y="3" width="7" height="7" rx="1.5"/>
            <rect x="14" y="3" width="7" height="7" rx="1.5"/>
            <rect x="3" y="14" width="7" height="7" rx="1.5"/>
            <rect x="14" y="14" width="7" height="7" rx="1.5"/>
          </svg>
          <span class="text-sm">All Games</span>
        </div>
        <svg class="ml-auto text-slate-600" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
      </a>

      <!-- TODO (Tier 2 — user accounts): Sign In / Create Account row -->
      <!-- TODO (Tier 2): Privacy & Data, Export stats, Delete account -->
    </section>

    <!-- Version / debug info -->
    <p class="text-center text-xs text-slate-700 pb-2" id="version-label"></p>

    <div class="pb-4"></div>
  </div>

  <script type="module">
    import { mountTabBar } from '/games/common/tab-bar.js';
    import { requestPushPermission, unsubscribePush, isPushSubscribed, hasPushOptIn } from '/games/common/push.js';

    mountTabBar('profile');

    // ── Helpers ──────────────────────────────────────────────────────────────
    function getPTDateYYYYMMDD(now = new Date()) {
      const dtf = new Intl.DateTimeFormat('en-CA', {
        timeZone: 'America/Los_Angeles',
        year: 'numeric', month: '2-digit', day: '2-digit'
      });
      const parts = dtf.formatToParts(now);
      return `${parts.find(p=>p.type==='year').value}-${parts.find(p=>p.type==='month').value}-${parts.find(p=>p.type==='day').value}`;
    }

    function formatTime(ms) {
      if (!ms || ms <= 0) return '—';
      const s = Math.floor(ms / 1000);
      const m = Math.floor(s / 60);
      const sec = s % 60;
      if (m > 0) return `${m}:${String(sec).padStart(2,'0')}`;
      return `${sec}s`;
    }

    function getAnonId() {
      try { return localStorage.getItem('dailygrid_anon_id'); } catch { return null; }
    }

    const GAME_META = [
      { id: 'bits',      name: 'Bits',        logo: '/games/bits/bitsnew-logo.jpg' },
      { id: 'hashi',     name: 'Bridgeworks', logo: '/games/hashi/hashi-logo.jpg' },
      { id: 'snake',     name: 'Snake',       logo: '/games/snake/snake-logo.png' },
      { id: 'shikaku',   name: 'Parcel',      logo: '/games/shikaku/shikaku-logo.jpg' },
      { id: 'pathways',  name: 'Pathways',    logo: '/games/pathways/pathways-logo.png' },
      { id: 'lattice',   name: 'Logice',      logo: '/games/lattice/lattice-logo.png?v=2' },
      { id: 'conduit',   name: 'Conduit',     logo: '/games/conduit/conduit-logo.png' },
      { id: 'perimeter', name: 'Perimeter',   logo: '/games/perimeter/perimeter-logo.png' },
      { id: 'polyfit',   name: 'Polyfit',     logo: '/games/polyfit/polyfit-logo.png' },
    ];

    // ── Load stats from localStorage ─────────────────────────────────────────
    function loadStats() {
      let totalSolved = 0;
      let earliestDate = null;
      let bestInitials = null;
      const gameRows = [];

      for (const { id, name, logo } of GAME_META) {
        // Stats
        let statsData = null;
        try { statsData = JSON.parse(localStorage.getItem(`dailygrid_${id}_stats`) || 'null'); } catch {}

        // Streak
        let streakData = null;
        try { streakData = JSON.parse(localStorage.getItem(`dailygrid_${id}_streak`) || 'null'); } catch {}

        const completed = statsData?.totalCompleted || 0;
        const avgMs = (statsData?.timeSamples > 0) ? statsData.totalTimeMs / statsData.timeSamples : 0;
        const current = streakData?.current || 0;
        const best = streakData?.best || 0;
        const lastDate = streakData?.lastCompletedDate || null;

        // Find initials from most recent leaderboard entry
        if (!bestInitials) {
          for (let i = 0; i < localStorage.length; i++) {
            const key = localStorage.key(i);
            if (!key?.startsWith(`dailygrid_${id}_leaderboard_`)) continue;
            try {
              const entry = JSON.parse(localStorage.getItem(key));
              if (entry?.initials) { bestInitials = entry.initials; break; }
            } catch {}
          }
        }

        // Track earliest activity for "member since"
        if (lastDate) {
          if (!earliestDate || lastDate < earliestDate) earliestDate = lastDate;
        }

        totalSolved += completed;
        if (completed > 0) {
          gameRows.push({ id, name, logo, completed, avgMs, current, best });
        }
      }

      return { totalSolved, earliestDate, bestInitials, gameRows };
    }

    function countMedals() {
      const counts = { gold: 0, silver: 0, bronze: 0, top10: 0 };
      for (const { id } of GAME_META) {
        for (let i = 0; i < localStorage.length; i++) {
          const key = localStorage.key(i);
          if (!key?.startsWith(`dailygrid_${id}_leaderboard_`)) continue;
          try {
            const entry = JSON.parse(localStorage.getItem(key));
            const rank = entry?.rank;
            if (!rank) continue;
            if (rank === 1) counts.gold++;
            else if (rank === 2) counts.silver++;
            else if (rank === 3) counts.bronze++;
            if (rank <= 10) counts.top10++;
          } catch {}
        }
      }
      return counts;
    }

    // ── Render ────────────────────────────────────────────────────────────────
    function renderProfile() {
      const { totalSolved, earliestDate, bestInitials, gameRows } = loadStats();
      const medals = countMedals();

      // Avatar
      const initials = bestInitials || (getAnonId() || '?').slice(0, 2).toUpperCase();
      document.getElementById('avatar-initials').textContent = initials;

      // Display name — TODO (Tier 2): replace with auth username
      // Using a friendly label based on streak for now
      const totalStreak = gameRows.reduce((s, r) => s + r.current, 0);
      if (totalStreak >= 30) document.getElementById('display-name').textContent = 'Elite Solver';
      else if (totalStreak >= 7)  document.getElementById('display-name').textContent = 'Daily Solver';
      else document.getElementById('display-name').textContent = 'Anonymous Solver';

      // Member since
      if (earliestDate) {
        const d = new Date(earliestDate + 'T12:00:00');
        document.getElementById('member-since').textContent =
          'Since ' + d.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
      } else {
        document.getElementById('member-since').textContent = 'Just getting started!';
      }

      // Total solved
      document.getElementById('total-solved').textContent = totalSolved;

      // Medals
      document.getElementById('medal-gold').textContent   = medals.gold;
      document.getElementById('medal-silver').textContent = medals.silver;
      document.getElementById('medal-bronze').textContent = medals.bronze;
      document.getElementById('medal-top10').textContent  = medals.top10;

      // Per-game stats
      const list = document.getElementById('game-stats-list');
      if (gameRows.length === 0) {
        list.innerHTML = '<p class="text-sm text-slate-500 text-center py-4">Complete some puzzles to see your stats.</p>';
      } else {
        // Sort by completed count descending
        gameRows.sort((a, b) => b.completed - a.completed);
        list.innerHTML = gameRows.map(({ name, logo, completed, avgMs, current, best }) => `
          <div class="game-stat-row gap-3 flex items-center">
            <img src="${logo}" alt="${name}" class="game-logo-sm" onerror="this.style.display='none'">
            <div class="flex-1 min-w-0">
              <p class="text-sm font-semibold leading-tight">${name}</p>
              <p class="text-xs text-slate-500 mt-0.5">${completed} solved · avg ${formatTime(avgMs)}</p>
            </div>
            <div class="text-right flex-shrink-0">
              ${current >= 2
                ? `<p class="text-xs font-bold streak-flame flex items-center gap-1 justify-end">
                    <svg width="10" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2c0 6-6 8-6 14a6 6 0 0012 0c0-6-6-8-6-14z"/></svg>
                    ${current}</p>`
                : '<p class="text-xs text-slate-600">—</p>'
              }
              ${best > 1 ? `<p class="text-xs best-streak">best ${best}</p>` : ''}
            </div>
          </div>`).join('');
      }
    }

    // ── Push notifications ────────────────────────────────────────────────────
    async function initPushToggle() {
      const toggle = document.getElementById('push-toggle');
      const statusText = document.getElementById('push-status-text');
      const row = document.getElementById('push-toggle-wrap')?.closest('.stat-row');

      // iOS Safari (non-standalone) does not support Web Push — hide the row
      const isIos = /iphone|ipad|ipod/i.test(navigator.userAgent);
      const isStandalone = !!window.navigator.standalone;
      if (isIos && !isStandalone) {
        if (row) row.style.display = 'none';
        return;
      }

      if (!('serviceWorker' in navigator) || !('PushManager' in window)) {
        if (row) row.style.display = 'none';
        return;
      }

      // If the user has already blocked notifications, show a locked state with instructions
      if (typeof Notification !== 'undefined' && Notification.permission === 'denied') {
        toggle.checked = false;
        toggle.disabled = true;
        statusText.textContent = isIos
          ? 'Blocked — go to Settings > Daily Grid > Notifications to enable'
          : 'Blocked — go to browser site settings to re-enable notifications';
        return;
      }

      // Sync toggle state with actual subscription
      const subscribed = await isPushSubscribed();
      toggle.checked = subscribed;
      statusText.textContent = subscribed
        ? 'You will be notified when new puzzles are live'
        : 'Get notified when new puzzles are live';

      toggle.addEventListener('change', async () => {
        if (toggle.checked) {
          const anonId = getAnonId();
          statusText.textContent = 'Requesting permission…';
          toggle.disabled = true;
          const ok = await requestPushPermission(anonId, window.DG_VAPID_PUBLIC_KEY);
          toggle.disabled = false;
          toggle.checked = ok;
          if (ok) {
            statusText.textContent = 'You will be notified when new puzzles are live';
          } else if (typeof Notification !== 'undefined' && Notification.permission === 'denied') {
            toggle.disabled = true;
            statusText.textContent = isIos
              ? 'Blocked — go to Settings > Daily Grid > Notifications to enable'
              : 'Blocked — go to browser site settings to re-enable notifications';
          } else {
            statusText.textContent = 'Could not enable — try again later';
          }
        } else {
          statusText.textContent = 'Unsubscribing…';
          await unsubscribePush();
          statusText.textContent = 'Get notified when new puzzles are live';
        }
      });
    }

    // ── Version label ─────────────────────────────────────────────────────────
    function renderVersion() {
      const anonId = getAnonId();
      if (anonId) {
        document.getElementById('version-label').textContent = `ID: ${anonId.slice(0, 8)}…`;
      }
    }

    // ── Init ──────────────────────────────────────────────────────────────────
    // Load VAPID public key from server so push subscriptions can be created
    fetch('/api/push/vapid-public-key').then(r => r.json()).then(d => {
      if (d.publicKey) window.DG_VAPID_PUBLIC_KEY = d.publicKey;
    }).catch(() => {});

    renderProfile();
    renderVersion();
    initPushToggle();
  </script>
</body>
</html>
