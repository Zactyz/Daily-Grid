<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Polyfit — Daily Grid</title>
<link rel="manifest" href="/games/polyfit/manifest.json"><link rel="icon" href="/games/polyfit/polyfit-logo.svg">
<meta name="theme-color" content="#120f1a"><script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="/games/common/shell.css">
<style>body{background:#120f1a;color:#fff;font-family:Inter,sans-serif}#polyfit-canvas{width:100%;aspect-ratio:1;border-radius:14px;background:#1d1328}.btn{padding:.55rem 1rem;border:1px solid #ffffff22;border-radius:.6rem} .btnp{background:#f59e0b;color:#1a0f05;border:none}</style>
</head><body>
<main class="max-w-lg mx-auto px-4 pt-20 pb-8 flex flex-col items-center">
<header class="text-center mb-4"><div id="daily-badge" class="text-xs text-amber-300">Daily Puzzle</div><div id="practice-badge" class="hidden text-xs text-amber-300">Practice</div><h1 class="text-3xl font-bold">Polyfit</h1><p class="text-sm text-white/70">Fit every polyomino into the box. Tap a placed piece to remove it.</p><div class="text-xs mt-1 text-white/50"><span id="puzzle-date"></span> • <span id="grid-size"></span></div></header>
<div id="game-container" class="w-full p-3 rounded-2xl border border-white/10 bg-white/5 game-touch"><div id="progress-text" class="text-center text-xs mb-2"></div><canvas id="polyfit-canvas" class="celebrate-target"></canvas></div>
<div id="piece-tray" class="w-full mt-3 grid grid-cols-3 gap-2"></div>
<div class="flex gap-2 my-3"><button id="rotate-piece-btn" class="btn">Rotate</button><button id="pause-btn" class="btn">Pause</button><button id="reset-btn" class="btn">Reset</button><button id="leaderboard-btn" class="btn hidden">Leaderboard</button></div>
<button id="practice-mode-btn" class="w-full py-3 rounded-xl border border-white/10 text-sm text-white/70">Try Practice Levels</button>
<button id="back-to-daily-btn" class="hidden w-full mt-3 py-3 rounded-xl border border-amber-500/20 text-amber-300 text-sm">Back to Daily Puzzle</button>
</main>
<div id="pause-overlay" class="hidden fixed inset-0 bg-black/70"></div><div id="start-overlay" class="hidden fixed inset-0 bg-black/40"></div>
<div id="reset-modal" class="hidden fixed inset-0 bg-black/70 p-4"><div class="max-w-sm mx-auto mt-40 p-5 rounded-xl bg-zinc-900"><h2>Reset Puzzle?</h2><div class="mt-3 flex gap-2"><button id="cancel-reset-btn" class="btn flex-1">Cancel</button><button id="confirm-reset-btn" class="btn btnp flex-1">Reset</button></div></div></div>
<div id="completion-modal" class="hidden fixed inset-0 bg-black/70 p-4"><div class="max-w-md mx-auto mt-16 p-5 rounded-xl bg-zinc-900"><h2 id="modal-title" class="text-2xl font-bold">Solved!</h2><p id="modal-subtitle" class="text-sm text-white/70 mb-2"></p><div id="final-time" class="text-3xl"></div><p id="percentile-msg" class="text-sm my-2"></p><form id="claim-initials-form" class="hidden"><input id="initials-input" maxlength="3" class="bg-black/30 border border-white/20 rounded px-2 py-1"><button class="btn">Claim</button></form><h3 id="leaderboard-title" class="mt-2">Today's Top Scores</h3><div id="leaderboard-list"></div><div class="flex gap-2 mt-3"><button id="share-btn" class="btn btnp flex-1">Share</button><button id="practice-infinite-btn" class="btn flex-1">Practice</button><button id="close-modal-btn" class="btn flex-1">Close</button></div><div id="practice-complete-actions" class="hidden mt-3"><div class="flex gap-2"><button id="try-again-btn" class="btn flex-1">Try Again</button><button id="next-level-btn" class="btn btnp flex-1">Next</button></div><button id="back-to-daily-complete-btn" class="btn w-full mt-2">Back to Daily</button></div><div id="next-game-promo" class="hidden"></div></div></div>
<a id="external-game-promo" class="hidden"></a><div id="shell-toast" class="hidden"><span id="shell-toast-text"></span></div>
<script type="module">import { mountShell } from '../common/shell-mount.js'; mountShell();</script>
<script type="module" src="./polyfit-ui.js"></script>
</body></html>
