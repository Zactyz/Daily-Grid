<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Practice Puzzles | Daily Grid Games</title>
  <meta name="theme-color" content="#0b1120">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Daily Grid Games">
  <link rel="manifest" href="/games/manifest.json">
  <link rel="apple-touch-icon" href="/games/assets/dg-games-180.png">
  <link rel="icon" type="image/png" href="/Images/web%20icon.png">
  <meta name="description" content="Sharpen your skills with unlimited practice puzzles across every Daily Grid game.">
  <link rel="canonical" href="https://dailygrid.app/games/practice/">
  <meta property="og:title" content="Practice Puzzles | Daily Grid Games">
  <meta property="og:description" content="Sharpen your skills with unlimited practice puzzles across every Daily Grid game.">
  <meta property="og:image" content="https://dailygrid.app/games/assets/og-games.png">
  <meta property="og:url" content="https://dailygrid.app/games/practice/">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Practice Puzzles | Daily Grid Games">
  <meta name="twitter:description" content="Sharpen your skills with unlimited practice puzzles across every Daily Grid game.">
  <meta name="twitter:image" content="https://dailygrid.app/games/assets/og-games.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/games/common/design-tokens.css">
  <link rel="stylesheet" href="/games/common/tab-bar.css">
  <link rel="stylesheet" href="/games/common/hub-nav.css">
  <link rel="stylesheet" href="/games/common/hub-footer.css">
  <style>
    body {
      font-family: var(--dg-font-ui);
      background: var(--dg-bg);
      color: var(--dg-text);
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% -10%, rgba(60, 90, 160, 0.35), transparent),
        radial-gradient(ellipse 70% 40% at 0% 100%, rgba(35, 60, 120, 0.25), transparent),
        radial-gradient(ellipse 50% 30% at 100% 0%, rgba(120, 85, 20, 0.18), transparent);
      z-index: -1;
      pointer-events: none;
    }

    .gold-gradient {
      background: linear-gradient(135deg, #f9e6a0 0%, #d9a83c 50%, #f3c867 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .app-card {
      border: 1px solid rgba(212, 166, 80, 0.2);
      background: rgba(255, 255, 255, 0.02);
      transition: all 0.2s ease;
    }

    .app-card:hover {
      border-color: rgba(212, 166, 80, 0.45);
      background: rgba(255, 255, 255, 0.05);
      transform: translateY(-2px);
    }

    .app-header { font-family: 'Space Grotesk', sans-serif; }
    .app-section-title {
      font-family: 'Space Grotesk', sans-serif;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-size: 0.65rem;
      color: rgba(212, 166, 80, 0.75);
    }

    .back-pill {
      width: 40px;
      height: 40px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(8, 10, 12, 0.7);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(12px);
    }
  </style>
</head>
<body class="min-h-screen dg-hub-nav-page dg-hub-site-fonts">
  <nav id="dg-hub-nav" class="dg-hub-nav" aria-label="Games hub">
      <a href="/" class="dg-hub-nav__brand">
        <img src="/Images/web%20icon.png" alt="" class="dg-hub-nav__logo" width="40" height="40" decoding="async">
        <span class="dg-hub-nav__title">Daily Grid</span>
      </a>
      <div class="dg-hub-nav__links">
        <a href="/games/" data-hub-key="daily">Daily</a>
        <a href="/games/practice/" data-hub-key="practice" class="is-active" aria-current="page">Practice</a>
        <a href="/games/medals/" data-hub-key="medals">Medals</a>
        <a href="/games/profile/" data-hub-key="profile">Profile</a>
      </div>
    </nav>
<main id="main-content" tabindex="-1" class="hub-page-main pb-3">
    <!-- Mobile page header -->
    <div class="hub-page-header flex items-center gap-3 app-header">
      <img src="/games/assets/dg-games-192.png" alt="" class="hub-mobile-header-icon hub-mobile-header-icon--pwa" width="40" height="40" decoding="async">
      <div>
        <p class="text-[11px] uppercase tracking-[0.3em] text-slate-400">Daily Grid</p>
        <h1 class="text-2xl font-semibold rank-gold">Practice</h1>
      </div>
    </div>

    <!-- Desktop page header -->
    <header class="hub-desktop-hero hub-desktop-hero--left hub-desktop-only max-w-5xl mx-auto mb-10">
      <h1 class="hub-desktop-hero__title"><span class="hub-gold-gradient">Practice Puzzles</span></h1>
    </header>

    <div class="hub-mobile-only app-section-title mb-3">Choose A Game</div>
    <div id="practice-game-list" class="hub-practice-grid max-w-5xl mx-auto"></div>
    <!-- Tailwind CDN safelist for dynamically injected card classes -->
    <div aria-hidden="true" class="hidden w-12 h-12 rounded-xl flex items-center gap-3 shrink-0 min-w-0 inline-flex gap-1.5"></div>
  </main>
  <script type="module">
    import { mountTabBar } from '/games/common/tab-bar.js';
    import { mountHubNav } from '/games/common/hub-nav.js';
    import { mountHubFooter } from '/games/common/hub-footer.js';
    import { maybeShowAnnouncementModal } from '/games/common/announcements.js';
    import { renderPracticeGameList } from '/games/common/practice-hub.js';

    renderPracticeGameList(document.getElementById('practice-game-list'));
    mountTabBar('practice');
    mountHubNav('practice');
    mountHubFooter();
    setTimeout(() => maybeShowAnnouncementModal({ gameId: 'hub', mode: 'practice' }), 500);
  </script>
  <nav id="dg-tab-bar" class="dg-tab-bar" aria-label="Main navigation"><ul class="dg-tab-bar__list">
    <li class="dg-tab-bar__tab" data-tab="daily"><a href="/games/" aria-label="Daily"><svg class="dg-tab-bar__icon" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="7.5" height="7.5" rx="1.5"/><rect x="13.5" y="3" width="7.5" height="7.5" rx="1.5"/><rect x="3" y="13.5" width="7.5" height="7.5" rx="1.5"/><rect x="13.5" y="13.5" width="7.5" height="7.5" rx="1.5"/></svg><span class="dg-tab-bar__label">Daily</span></a></li>
    <li class="dg-tab-bar__tab active" data-tab="practice"><a href="/games/practice/" aria-label="Practice" aria-current="page"><svg class="dg-tab-bar__icon" viewBox="0 0 24 24" fill="currentColor"><rect x="2" y="7" width="3.5" height="10" rx="1.75"/><rect x="5.5" y="10" width="1.5" height="4" rx="0.75"/><rect x="7" y="11" width="10" height="2" rx="1"/><rect x="17" y="10" width="1.5" height="4" rx="0.75"/><rect x="18.5" y="7" width="3.5" height="10" rx="1.75"/></svg><span class="dg-tab-bar__label">Practice</span></a></li>
    <li class="dg-tab-bar__tab" data-tab="medals"><a href="/games/medals/" aria-label="Medals"><svg class="dg-tab-bar__icon" viewBox="0 0 24 24" fill="currentColor"><rect x="10.5" y="2" width="3" height="4.5" rx="0.75"/><circle cx="12" cy="15" r="7"/></svg><span class="dg-tab-bar__label">Medals</span></a></li>
    <li class="dg-tab-bar__tab" data-tab="profile"><a href="/games/profile/" aria-label="Profile"><svg class="dg-tab-bar__icon" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="7.5" r="3.5"/><path d="M4 21c0-4.4 3.6-7.5 8-7.5s8 3.1 8 7.5z"/></svg><span class="dg-tab-bar__label">Profile</span></a></li>
  </ul></nav>
</body>
</html>
