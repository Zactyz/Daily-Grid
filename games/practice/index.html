<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Practice Puzzles — Daily Grid Games</title>
  <meta name="description" content="Practice puzzles for Daily Grid Games." />
  <meta name="theme-color" content="#0b1120">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Daily Grid Games">
  <link rel="manifest" href="/games/manifest.json">
  <link rel="apple-touch-icon" href="/games/assets/dg-games-180.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/games/common/design-tokens.css">
  <link rel="stylesheet" href="/games/common/tab-bar.css">
  <style>
    body {
      font-family: var(--dg-font-ui);
      background: var(--dg-bg);
      color: var(--dg-text);
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% -10%, rgba(60, 90, 160, 0.35), transparent),
        radial-gradient(ellipse 70% 40% at 0% 100%, rgba(35, 60, 120, 0.25), transparent),
        radial-gradient(ellipse 50% 30% at 100% 0%, rgba(120, 85, 20, 0.18), transparent);
      z-index: -1;
      pointer-events: none;
    }

    .gold-gradient {
      background: linear-gradient(135deg, #f9e6a0 0%, #d9a83c 50%, #f3c867 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .app-card {
      border: 1px solid rgba(212, 166, 80, 0.2);
      background: rgba(255, 255, 255, 0.02);
      transition: all 0.2s ease;
    }

    .app-card:hover {
      border-color: rgba(212, 166, 80, 0.45);
      background: rgba(255, 255, 255, 0.05);
      transform: translateY(-2px);
    }

    .app-header { font-family: 'Space Grotesk', sans-serif; }
    .app-section-title {
      font-family: 'Space Grotesk', sans-serif;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-size: 0.65rem;
      color: rgba(212, 166, 80, 0.75);
    }

    .back-pill {
      width: 40px;
      height: 40px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(8, 10, 12, 0.7);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(12px);
    }
  </style>
</head>
<body class="min-h-screen">
  <script src="/games/common/desktop-redirect.js"></script>
  <main class="max-w-lg mx-auto px-4 pt-6 pb-3">
    <!-- Header -->
    <div class="flex items-center gap-3 mb-6 app-header">
      <div class="w-10 h-10 rounded-xl flex items-center justify-center" style="background:rgba(212,166,80,0.1);border:1px solid rgba(212,166,80,0.2)">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#d9a83c" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2l3 6.5 7 1-5 5 1.2 7L12 18l-6.2 3.5L7 14.5l-5-5 7-1z"/>
        </svg>
      </div>
      <div>
        <p class="text-[11px] uppercase tracking-[0.3em] text-slate-400">Daily Grid</p>
        <h1 class="text-2xl font-semibold text-amber-200">Practice</h1>
      </div>
    </div>

    <div class="app-section-title mb-3">Choose A Game</div>
    <div id="practice-game-list" class="grid gap-3"></div>
    <!--
      Cards injected synchronously so Tailwind CDN sees all classes on its
      initial DOM scan (DOMContentLoaded) — prevents the deferred-module
      "growing into place" flash that occurs when classes appear after load.
    -->
    <script>!function(){var g=[
      {n:'Snake',       t:'Practice the number path.',       l:'/games/snake/snake-logo.png',         p:'/games/snake/'},
      {n:'Pathways',    t:'Practice color routes.',          l:'/games/pathways/pathways-logo.png',   p:'/games/pathways/'},
      {n:'Logice',      t:'Practice logic grids.',           l:'/games/lattice/lattice-logo.png?v=2', p:'/games/lattice/'},
      {n:'Bits',        t:'Practice binary logic.',          l:'/games/bits/bitsnew-logo.jpg',        p:'/games/bits/'},
      {n:'Bridgeworks', t:'Practice island links.',          l:'/games/hashi/hashi-logo.jpg',         p:'/games/hashi/'},
      {n:'Parcel',      t:'Practice rectangle packing.',     l:'/games/shikaku/shikaku-logo.jpg',     p:'/games/shikaku/'},
      {n:'Conduit',     t:'Practice routing the current.',   l:'/games/conduit/conduit-logo.png',     p:'/games/conduit/'},
      {n:'Perimeter',   t:'Practice loop constraints.',      l:'/games/perimeter/perimeter-logo.png', p:'/games/perimeter/'},
      {n:'Polyfit',     t:'Practice shape packing.',         l:'/games/polyfit/polyfit-logo.png',     p:'/games/polyfit/'}
    ];document.getElementById('practice-game-list').innerHTML=g.map(function(x){
      return '<a href="'+x.p+'?practice=1" class="app-card rounded-2xl p-4 flex items-center gap-3">'
        +'<img src="'+x.l+'" alt="'+x.n+'" class="w-12 h-12 rounded-xl">'
        +'<div class="flex-1"><p class="font-semibold">'+x.n+'</p>'
        +'<p class="text-xs text-slate-400">'+x.t+'</p></div>'
        +'<span class="text-amber-300 text-sm font-semibold">Practice \u2192</span></a>';
    }).join('');}();</script>
  </main>
  <script type="module">
    import { mountTabBar } from '/games/common/tab-bar.js';
    import { maybeShowAnnouncementModal } from '/games/common/announcements.js';
    mountTabBar('practice');
    setTimeout(() => maybeShowAnnouncementModal({ gameId: 'hub', mode: 'practice' }), 500);
  </script>
  <nav id="dg-tab-bar" class="dg-tab-bar" aria-label="Main navigation"><ul class="dg-tab-bar__list">
    <li class="dg-tab-bar__tab" data-tab="daily"><a href="/games/" aria-label="Daily"><svg class="dg-tab-bar__icon" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="7.5" height="7.5" rx="1.5"/><rect x="13.5" y="3" width="7.5" height="7.5" rx="1.5"/><rect x="3" y="13.5" width="7.5" height="7.5" rx="1.5"/><rect x="13.5" y="13.5" width="7.5" height="7.5" rx="1.5"/></svg><span class="dg-tab-bar__label">Daily</span></a></li>
    <li class="dg-tab-bar__tab active" data-tab="practice"><a href="/games/practice/" aria-label="Practice" aria-current="page"><svg class="dg-tab-bar__icon" viewBox="0 0 24 24" fill="currentColor"><rect x="2" y="7" width="3.5" height="10" rx="1.75"/><rect x="5.5" y="10" width="1.5" height="4" rx="0.75"/><rect x="7" y="11" width="10" height="2" rx="1"/><rect x="17" y="10" width="1.5" height="4" rx="0.75"/><rect x="18.5" y="7" width="3.5" height="10" rx="1.75"/></svg><span class="dg-tab-bar__label">Practice</span></a></li>
    <li class="dg-tab-bar__tab" data-tab="medals"><a href="/games/medals/" aria-label="Medals"><svg class="dg-tab-bar__icon" viewBox="0 0 24 24" fill="currentColor"><rect x="10.5" y="2" width="3" height="4.5" rx="0.75"/><circle cx="12" cy="15" r="7"/></svg><span class="dg-tab-bar__label">Medals</span></a></li>
    <li class="dg-tab-bar__tab" data-tab="profile"><a href="/games/profile/" aria-label="Profile"><svg class="dg-tab-bar__icon" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="7.5" r="3.5"/><path d="M4 21c0-4.4 3.6-7.5 8-7.5s8 3.1 8 7.5z"/></svg><span class="dg-tab-bar__label">Profile</span></a></li>
  </ul></nav>
</body>
</html>
